<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congratulations Melissa!</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Arial', sans-serif;
    }

    body{
        overflow:hidden;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff4e50,#fc913a,#f9d423,#00c9ff,#92fe9d);
        background-size:400% 400%;
        animation:gradient 10s ease infinite;
        color:white;
    }

    @keyframes gradient{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }

    .card{
        text-align:center;
        background:rgba(255,255,255,0.12);
        backdrop-filter:blur(15px);
        padding:50px 40px;
        border-radius:30px;
        box-shadow:0 20px 50px rgba(0,0,0,.3);
        animation:float 3s ease-in-out infinite;
        z-index:2;
    }

    @keyframes float{
        0%,100%{
            transform:translateY(0);
        }
        50%{
            transform:translateY(-10px);
        }
    }

    h1{
        font-size:4rem;
        text-transform:uppercase;
        text-shadow:
            0 0 10px #fff,
            0 0 20px #fff,
            0 0 40px gold,
            0 0 80px gold;
        animation:pulse 2s infinite;
    }

    @keyframes pulse{
        0%,100%{
            transform:scale(1);
        }
        50%{
            transform:scale(1.05);
        }
    }

    .name{
        color:#ffe600;
    }

    .score{
        font-size:2.8rem;
        margin:25px 0;
        font-weight:bold;
    }

    p{
        font-size:1.4rem;
        line-height:1.6;
    }

    .emoji{
        font-size:3rem;
        margin-top:25px;
        animation:bounce 1s infinite alternate;
    }

    @keyframes bounce{
        from{
            transform:translateY(0);
        }
        to{
            transform:translateY(-15px);
        }
    }

    canvas{
        position:fixed;
        top:0;
        left:0;
        pointer-events:none;
    }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="card">
    <h1>🎉 Congratulations <span class="name">Melissa</span>! 🎉</h1>

    <div class="score">
        🏆 Your Semester Average is <br>
        <span style="font-size:4rem;">13 / 20</span>
    </div>

    <p>
        You did it! ✨<br>
        Your hard work, dedication, and perseverance paid off.
    </p>

    <div class="emoji">
        🎓🎊🥳🎉🍾✨
    </div>
</div>

<script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const pieces = [];

for(let i=0; i<250; i++){
    pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 8 + 3,
        d: Math.random() * 250,
        color: `hsl(${Math.random()*360},100%,50%)`,
        tilt: Math.random() * 10 - 10,
        tiltAngle: 0,
        tiltAngleIncremental: Math.random() * 0.07 + 0.05
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p => {
        ctx.beginPath();
        ctx.lineWidth = p.r;
        ctx.strokeStyle = p.color;

        ctx.moveTo(p.x + p.tilt + p.r/2, p.y);
        ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);

        ctx.stroke();
    });

    update();
}

function update(){
    pieces.forEach((p,index) => {
        p.tiltAngle += p.tiltAngleIncremental;

        p.y += (Math.cos(p.d) + 3 + p.r/2) / 2;
        p.x += Math.sin(p.d);

        p.tilt = Math.sin(p.tiltAngle) * 15;

        if(p.y > canvas.height){
            pieces[index] = {
                ...p,
                x: Math.random() * canvas.width,
                y: -20
            };
        }
    });
}

function animate(){
    draw();
    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
